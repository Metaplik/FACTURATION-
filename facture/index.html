<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Facture</title>
<style>
* { box-sizing: border-box; }
body { font-family: Arial, sans-serif; max-width: 900px; margin: auto; padding: 10px 10px 100px; }
.upload-btn { margin-bottom: 10px; }
.top { display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
.left-col { flex: 1; min-width: 220px; }
.right-col { text-align: right; flex: 1; min-width: 260px; }
.logo-box { width: 220px; height: 100px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 10px; }
.logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
.auto-ta { width: 100%; border: none; border-bottom: 1px solid #eee; resize: none; overflow: hidden; font-family: Arial, sans-serif; font-size: 14px; background: transparent; padding: 2px 0; display: block; min-height: 26px; line-height: 1.4; }
.auto-ta:focus { outline: none; border-bottom-color: #aaa; }
.info-line { width: 100%; border: none; border-bottom: 1px solid #eee; background: transparent; font-size: 13px; font-family: Arial, sans-serif; padding: 3px 0; margin-bottom: 2px; display: block; }
.info-line:focus { outline: none; border-bottom-color: #aaa; }
.big-title { display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
.big-title input { font-size: 28px; font-weight: bold; text-align: right; border: none; border-bottom: 1px solid #eee; background: transparent; width: 100%; color: navy; }
.big-title input:focus { outline: none; }
.toggle-doc { display: inline-flex; border: 1px solid #ccc; border-radius: 20px; overflow: hidden; font-size: 12px; margin-bottom: 8px; }
.toggle-doc button { border: none; background: #f2f2f2; padding: 5px 14px; cursor: pointer; font-weight: bold; color: #666; }
.toggle-doc button.actif { background: navy; color: white; }
.meta-line { margin: 4px 0; font-size: 14px; }
.meta-line input { border: none; border-bottom: 1px solid #eee; background: transparent; font-size: 14px; font-family: Arial; }
.meta-line input:focus { outline: none; }
.client-box { margin-top: 20px; text-align: right; }
.client-box input { text-align: right; border: none; border-bottom: 1px solid #eee; background: transparent; font-size: 14px; font-family: Arial; width: 100%; }
.client-box input:focus { outline: none; }
.section { margin-top: 24px; }
.section input { border: none; border-bottom: 1px solid #eee; background: transparent; font-size: 14px; font-family: Arial; width: 100%; }
.section input:focus { outline: none; }
.section-label { border: none; border-bottom: 1px solid #eee; background: transparent; font-size: 14px; font-family: Arial; font-weight: bold; width: 140px; padding: 0; margin-right: 6px; }
.section-label:focus { outline: none; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
th { background: #FEF3C7; font-size: 13px; }
td, th { border: 1px solid #ccc; padding: 5px; text-align: center; vertical-align: top; }
td:nth-child(1), th:nth-child(1) { width: 36%; text-align: left; }
td:nth-child(2), th:nth-child(2) { width: 13%; }
td:nth-child(3), th:nth-child(3) { width: 6%; }
td:nth-child(4), th:nth-child(4) { width: 7%; }
td:nth-child(5), th:nth-child(5) { width: 11%; }
td:nth-child(6), th:nth-child(6) { width: 8%; }
td:nth-child(7), th:nth-child(7) { width: 19%; }
td input, td textarea { width: 100%; border: none; background: transparent; font-size: 13px; font-family: Arial; resize: none; overflow: hidden; padding: 0; }
td input:focus, td textarea:focus { outline: none; }
.desc-ta { min-height: 24px; line-height: 1.4; display: block; }
#dateGlobale { width: 100%; font-size: 11px; border: 1px solid #ccc; border-radius: 3px; background: #fff; padding: 1px 2px; margin-top: 3px; }
#dateGlobale:focus { outline: none; border-color: #888; }
.date-affichee { display: inline-block; min-height: 16px; font-size: 13px; }
.total-box { text-align: right; margin-top: 16px; font-size: 14px; line-height: 2; }
.total-box b { color: #d32f2f; }
.btn-add { margin-top: 8px; background: #eee; border: 1px solid #ccc; padding: 6px 14px; cursor: pointer; border-radius: 4px; font-size: 14px; }
.btn-add:hover { background: #ddd; }
hr { border: none; border-top: 1px solid #ddd; margin: 20px 0; }
.legal-mention { font-size: 11px; color: #555; border: 1px solid #eee; background: transparent; width: 100%; font-family: Arial; padding: 4px 0; resize: vertical; min-height: 40px; }
.legal-mention:focus { outline: none; border-color: #aaa; }
.btns-fixed { position: fixed; bottom: 10px; left: 0; right: 0; display: flex; justify-content: space-between; gap: 6px; padding: 0 10px; flex-wrap: wrap; }
.btns-fixed button { flex: 1; min-width: 70px; background: #555; color: #fff; border: none; padding: 11px 10px; cursor: pointer; border-radius: 4px; font-size: 12px; }
.btns-fixed button:hover { background: #333; }
.btn-pdf { background: #1a6dc4 !important; }
.btn-pdf:hover { background: #144f96 !important; }
.btn-agenda { background: #2563EB !important; }
.btn-agenda:hover { background: #1d4ed8 !important; }
.btn-enregistrer { background: #059669 !important; }
.btn-enregistrer:hover { background: #047857 !important; }

@media print {
    @page { size: A4 portrait; margin: 15mm; }
    .btns-fixed, .upload-btn, .btn-add, .toggle-doc { display: none !important; }
    body { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
    input, textarea { border-bottom: none !important; }
    #dateGlobale { border: none !important; background: transparent !important; display: none !important; }
    table { page-break-inside: avoid; table-layout: fixed; width: 100%; }
    td:nth-child(1), th:nth-child(1) { width: 32% !important; }
    td:nth-child(2), th:nth-child(2) { width: 15% !important; }
    td:nth-child(3), th:nth-child(3) { width: 5% !important; }
    td:nth-child(4), th:nth-child(4) { width: 6% !important; }
    td:nth-child(5), th:nth-child(5) { width: 10% !important; }
    td:nth-child(6), th:nth-child(6) { width: 7% !important; }
    td:nth-child(7), th:nth-child(7) { width: 25% !important; }
}
</style>
</head>
<body>

<input class="upload-btn" type="file" accept="image/*" onchange="loadLogo(event)">

<div id="app">
<div class="top">
<div class="left-col">
<div class="logo-box">
<img id="logo" src="" style="display:none">
<span id="logo-placeholder" style="color:#aaa;font-size:13px">Logo</span>
</div>
<textarea class="auto-ta" id="nomEntreprise" placeholder="Nom entreprise" oninput="grow(this)"></textarea>
<input class="info-line" id="siretEntreprise" placeholder="N° SIRET">
<input class="info-line" id="sireneEntreprise" placeholder="N° SIRENE">
<input class="info-line" id="tvaEntreprise" placeholder="N° TVA intracommunautaire">
<input class="info-line" id="telEntreprise" placeholder="Téléphone entreprise">
<textarea class="auto-ta" id="emailEntreprise" placeholder="Email entreprise" oninput="grow(this)"></textarea>
<textarea class="auto-ta" id="adresseEntreprise" placeholder="Adresse entreprise" oninput="grow(this)"></textarea>
</div>

<div class="right-col">
<div class="toggle-doc">
<button type="button" id="btn-type-facture" class="actif" onclick="choisirTypeDocument('FACTURE')">FACTURE</button>
<button type="button" id="btn-type-devis" onclick="choisirTypeDocument('DEVIS')">DEVIS</button>
</div>
<div class="big-title">
<input id="titreDocument" value="FACTURE">
</div>
<div class="meta-line">Numéro : <input id="numeroFacture" value="" style="width:140px"></div>
<div class="meta-line">Date : <input type="date" id="dateFacture" style="width:150px"></div>
<div class="meta-line">Type : <input value="Prestation de service" style="width:200px"></div>

<div class="client-box">
<b>Client :</b>
<textarea class="auto-ta" placeholder="Nom Prénom" oninput="grow(this)" style="text-align:right"></textarea>
<textarea class="auto-ta" placeholder="Adresse + Code postal" oninput="grow(this)" style="text-align:right"></textarea>
<input placeholder="Téléphone" style="text-align:right">
<input id="emailClient" placeholder="Email client" style="text-align:right">
</div>
</div>
</div>

<div class="section">
<input class="section-label" id="labelFacturation" value="Facturation :">
<input placeholder="Ex: Débouchage">
</div>

<table id="table">
<tr>
<th>Description</th>
<th>Date<br><input type="date" id="dateGlobale" onchange="appliquerDate()"></th>
<th>Qté</th>
<th>Unité</th>
<th>Prix</th>
<th>TVA %</th>
<th>Montant</th>
</tr>
<tr>
<td><textarea class="desc-ta auto-ta" placeholder="Description prestation" oninput="grow(this); calc()"></textarea></td>
<td class="date-cell"><span class="date-affichee"></span></td>
<td><input type="number" value="1" oninput="calc()"></td>
<td><input value="h"></td>
<td><input type="number" value="0" oninput="calc()"></td>
<td><input type="number" value="20" oninput="calc()"></td>
<td class="montant">0,00 €</td>
</tr>
</table>

<button class="btn-add" onclick="addRow()">+ Ajouter une ligne</button>

<div class="total-box">
Total HT : <span id="ht">0,00</span> €<br>
TVA : <span id="tva">0,00</span> €<br>
<b>Total TTC : <span id="ttc">0,00</span> €</b>

<hr>

<div class="section">
<b>Conditions de paiement :</b><br>
<input id="conditionsPaiement" value="Par virement, espèce, chèque ou carte bancaire"><br><br>
<b>Mentions légales :</b><br>
<textarea class="legal-mention" id="mentionLegale" rows="2">Article L441-10 du Code de commerce : tout retard de paiement entraîne une pénalité, ainsi qu'une indemnité forfaitaire de 40 € pour frais de recouvrement.</textarea>
</div>
</div>

<div class="btns-fixed">
<button onclick="envoyerEntreprise()">Envoyer entreprise</button>
<button class="btn-pdf" onclick="imprimerNatif()">⬇ PDF</button>
<button onclick="envoyerClient()">Envoyer client</button>
<button class="btn-agenda" onclick="ajouterFactureAgenda()">Agenda</button>
<button class="btn-enregistrer" id="btn-enregistrer" onclick="enregistrerDocumentFirestore()" disabled>Connexion...</button>
</div>
<div id="enregistrer-message" style="position:fixed;bottom:60px;left:10px;right:10px;background:#FEF3C7;border:1px solid #F59E0B;color:#92400E;padding:10px 14px;border-radius:8px;font-size:13px;display:none;z-index:100;"></div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCI1ZNhesbffGJ0VqUxyIoEhSwLwqBcyPE",
        authDomain: "proplus-e969a.firebaseapp.com",
        projectId: "proplus-e969a",
        storageBucket: "proplus-e969a.firebasestorage.app",
        messagingSenderId: "262149416577",
        appId: "1:262149416577:web:928517efa7336a43550f80"
    };
    firebase.initializeApp(firebaseConfig);

    let authPret = false;
    let utilisateurActuel = null;

    function debloquerBoutonEnregistrer(connecte) {
        const btn = document.getElementById('btn-enregistrer');
        if (!btn) return;
        btn.disabled = false;
        btn.innerText = connecte ? 'Enregistrer' : 'Enregistrer (non connecté)';
    }

    firebase.auth().onAuthStateChanged(function(user) {
        authPret = true;
        utilisateurActuel = user;
        debloquerBoutonEnregistrer(!!user);
    });

    // Filet de sécurité : si Firebase ne répond jamais en 5 secondes,

    setTimeout(function() {
        if (!authPret) {
            authPret = true;
            debloquerBoutonEnregistrer(false);
        }
    }, 5000);
</script>
<script>
function loadLogo(e) {
const img = document.getElementById('logo');
const ph = document.getElementById('logo-placeholder');
img.src = URL.createObjectURL(e.target.files[0]);
img.style.display = 'block';
ph.style.display = 'none';
}

function grow(el) {
el.style.height = 'auto';
el.style.height = el.scrollHeight + 'px';
}

function addRow() {
const table = document.getElementById('table');
const tr = document.createElement('tr');
tr.innerHTML = `
<td><textarea class="desc-ta auto-ta" placeholder="Description prestation" oninput="grow(this); calc()"></textarea></td>
<td class="date-cell"><span class="date-affichee"></span></td>
<td><input type="number" value="1" oninput="calc()"></td>
<td><input value="h"></td>
<td><input type="number" value="0" oninput="calc()"></td>
<td><input type="number" value="20" oninput="calc()"></td>
<td class="montant">0,00 €</td>
`;
table.appendChild(tr);
appliquerDate();
}

function fmt(n) {
return n.toFixed(2).replace('.', ',');
}

function calc() {
const rows = document.querySelectorAll('#table tr');
let totalHT = 0, totalTVA = 0;
rows.forEach((row, i) => {
if (i === 0) return;
const qte = parseFloat(row.cells[2].querySelector('input').value) || 0;
const prix = parseFloat(row.cells[4].querySelector('input').value) || 0;
const tva = parseFloat(row.cells[5].querySelector('input').value) || 0;
const ht = qte * prix;
const tvaAmt = ht * tva / 100;
row.cells[6].innerText = fmt(ht + tvaAmt) + ' \u20ac';
totalHT += ht;
totalTVA += tvaAmt;
});
document.getElementById('ht').innerText = fmt(totalHT);
document.getElementById('tva').innerText = fmt(totalTVA);
document.getElementById('ttc').innerText = fmt(totalHT + totalTVA);
}

function formatDateFR(iso) {
if (!iso) return '';
const p = iso.split('-');
if (p.length !== 3) return iso;
return p[2] + '/' + p[1] + '/' + p[0];
}

function appliquerDate() {
const dateInput = document.getElementById('dateGlobale');
const formatted = formatDateFR(dateInput ? dateInput.value : '');
document.querySelectorAll('.date-affichee').forEach(function(span) {
span.textContent = formatted;
});
}

function imprimerNatif() {
    window.print();
}

function envoyerEntreprise() {
const email = document.getElementById('emailEntreprise').value.trim();
if (!email) { alert("Veuillez renseigner l'email de l'entreprise."); return; }
const type = document.getElementById('titreDocument').value || 'Facture';
const sujet = encodeURIComponent(type);
const corps = encodeURIComponent("Bonjour,\n\nLe document vient d'être émis. Merci de l'enregistrer.\n\nCordialement.");
window.location.href = 'mailto:' + email + '?subject=' + sujet + '&body=' + corps;
}

function envoyerClient() {
const email = document.getElementById('emailClient').value.trim();
if (!email) { alert("Veuillez renseigner l'email du client."); return; }
const type = document.getElementById('titreDocument').value || 'Facture';
const sujet = encodeURIComponent(type);
const corps = encodeURIComponent("Bonjour,\n\nVeuillez trouver ci-joint votre document.\n\nCordialement.");
window.location.href = 'mailto:' + email + '?subject=' + sujet + '&body=' + corps;
}

// ===================== BASCULE FACTURE / DEVIS =====================
function choisirTypeDocument(type, regenererNumero) {
    if (regenererNumero === undefined) regenererNumero = true;
    const titre = document.getElementById('titreDocument');
    const label = document.getElementById('labelFacturation');
    const btnFacture = document.getElementById('btn-type-facture');
    const btnDevis = document.getElementById('btn-type-devis');

    titre.value = type;
    label.value = (type === 'DEVIS') ? 'Devis :' : 'Facturation :';

    btnFacture.classList.toggle('actif', type === 'FACTURE');
    btnDevis.classList.toggle('actif', type === 'DEVIS');

    if (regenererNumero) {
        genererNumeroAutomatique(type);
    }
}

function genererNumeroAutomatique(type) {
    const numeroChamp = document.getElementById('numeroFacture');
    numeroChamp.value = 'Génération du numéro...';
    (function attendreEtGenerer() {
        if (!authPret) { setTimeout(attendreEtGenerer, 150); return; }
        if (!utilisateurActuel) { numeroChamp.value = ''; return; }
        const cleCompteur = (type === 'DEVIS') ? 'devis' : 'facture';
        const prefixe = (type === 'DEVIS') ? 'D-' : 'F-';
        const annee = new Date().getFullYear();
        const ref = firebase.firestore().collection('compteurs').doc(cleCompteur);
        firebase.firestore().runTransaction(function(transaction) {
            return transaction.get(ref).then(function(doc) {
                const dernier = (doc.exists && doc.data().dernier) ? doc.data().dernier : 0;
                const nouveau = dernier + 1;
                transaction.set(ref, { dernier: nouveau }, { merge: true });
                return nouveau;
            });
        }).then(function(n) {
            numeroChamp.value = prefixe + annee + '-' + n;
        }).catch(function(err) {
            numeroChamp.value = prefixe + annee + '-1';
            afficherMessageEnregistrer('Numérotation automatique indisponible (' + err.message + '), numéro par défaut proposé — vérifiez avant enregistrement.', false);
        });
    })();
}

// ===================== AGENDA =====================
function ajouterFactureAgenda() {
    const type = document.getElementById('titreDocument').value || 'Facture';
    const numero = document.getElementById('numeroFacture').value || '';
    const clientNomEl = document.querySelector('.client-box .auto-ta');
    const nomClient = clientNomEl ? clientNomEl.value : '';
    const titre = type + ' ' + numero + (nomClient ? ' - ' + nomClient : '');
    const url = 'https://calendar.google.com/calendar/render?action=TEMPLATE&text=' + encodeURIComponent(titre);
    window.open(url, '_blank');
}

// ===================== ENREGISTREMENT FIRESTORE =====================
function afficherMessageEnregistrer(texte, ok) {
    const div = document.getElementById('enregistrer-message');
    div.textContent = texte;
    div.style.background = ok ? '#D1FAE5' : '#FEF3C7';
    div.style.borderColor = ok ? '#059669' : '#F59E0B';
    div.style.color = ok ? '#065F46' : '#92400E';
    div.style.display = 'block';
    setTimeout(function() { div.style.display = 'none'; }, 5000);
}

function clientCorrespondEnregistre(nomClient) {
    try {
        const brut = localStorage.getItem('clients_liste');
        const liste = brut ? JSON.parse(brut) : [];
        if (!Array.isArray(liste)) return false;
        const cible = (nomClient || '').trim().toLowerCase();
        return liste.some(function(c) { return (c.nom || '').trim().toLowerCase() === cible; });
    } catch (e) {
        return false;
    }
}

let docIdCourant = null;

function collecterLignesTable() {
    const lignes = [];
    document.querySelectorAll('#table tr').forEach(function(row, i) {
        if (i === 0) return;
        lignes.push({
            description: row.cells[0].querySelector('textarea').value,
            qte: row.cells[2].querySelector('input').value,
            unite: row.cells[3].querySelector('input').value,
            prix: row.cells[4].querySelector('input').value,
            tva: row.cells[5].querySelector('input').value
        });
    });
    return lignes;
}

function enregistrerDocumentFirestore() {
    if (!authPret) {
        afficherMessageEnregistrer("Vérification de connexion en cours, patientez une seconde puis réessayez.", false);
        return;
    }
    const user = utilisateurActuel;
    if (!user) {
        afficherMessageEnregistrer("Vous n'êtes pas connecté à PRO+, impossible d'enregistrer.", false);
        return;
    }

    const type = document.getElementById('titreDocument').value || 'FACTURE';
    const numero = document.getElementById('numeroFacture').value || '';
    const clientTa = document.querySelectorAll('.client-box .auto-ta');
    const clientInputs = document.querySelectorAll('.client-box input');
    const nomClient = clientTa[0] ? clientTa[0].value.trim() : '';
    const adresseClient = clientTa[1] ? clientTa[1].value : '';
    const telClient = clientInputs[0] ? clientInputs[0].value : '';
    const emailClient = document.getElementById('emailClient').value;
    const montantTTC = document.getElementById('ttc').innerText || '0,00';
    const date = document.getElementById('dateFacture').value || '';

    if (!nomClient) {
        afficherMessageEnregistrer("Renseignez le nom du client avant d'enregistrer.", false);
        return;
    }

    const rattache = clientCorrespondEnregistre(nomClient);

    const donnees = {
        type: type,
        numero: numero,
        clientNom: nomClient,
        clientAdresse: adresseClient,
        clientTel: telClient,
        clientEmail: emailClient,
        montantTTC: montantTTC,
        date: date,
        conditionsPaiement: document.getElementById('conditionsPaiement').value,
        mentionLegale: document.getElementById('mentionLegale').value,
        lignes: collecterLignesTable()
    };

    const col = firebase.firestore().collection('documents');
    const promesse = docIdCourant
        ? col.doc(docIdCourant).update(donnees)
        : col.add(Object.assign({}, donnees, { statut: 'en attente', creeLe: firebase.firestore.FieldValue.serverTimestamp() }))
            .then(function(ref) { docIdCourant = ref.id; });

    promesse.then(function() {
        if (rattache) {
            afficherMessageEnregistrer(type + ' ' + numero + ' enregistrée et rattachée à ' + nomClient + '.', true);
        } else {
            afficherMessageEnregistrer('Enregistré, mais "' + nomClient + '" ne correspond à aucun client enregistré sur PRO+ — ce document ne sera pas rattaché à une fiche client.', false);
        }
    }).catch(function(err) {
        afficherMessageEnregistrer("Erreur lors de l'enregistrement : " + err.message, false);
    });
}

function chargerDocumentDepuisFirestore(docId) {
    firebase.firestore().collection('documents').doc(docId).get().then(function(doc) {
        if (!doc.exists) {
            afficherMessageEnregistrer('Ce document est introuvable (peut-être supprimé).', false);
            return;
        }
        docIdCourant = docId;
        const d = doc.data();
        document.getElementById('titreDocument').value = d.type || 'FACTURE';
        choisirTypeDocument(d.type || 'FACTURE', false);
        document.getElementById('numeroFacture').value = d.numero || '';
        document.getElementById('dateFacture').value = d.date || '';
        document.getElementById('conditionsPaiement').value = d.conditionsPaiement || document.getElementById('conditionsPaiement').value;
        document.getElementById('mentionLegale').value = d.mentionLegale || document.getElementById('mentionLegale').value;

        const clientTa = document.querySelectorAll('.client-box .auto-ta');
        const clientInputs = document.querySelectorAll('.client-box input');
        if (clientTa[0]) { clientTa[0].value = d.clientNom || ''; grow(clientTa[0]); }
        if (clientTa[1]) { clientTa[1].value = d.clientAdresse || ''; grow(clientTa[1]); }
        if (clientInputs[0]) clientInputs[0].value = d.clientTel || '';
        document.getElementById('emailClient').value = d.clientEmail || '';

        if (Array.isArray(d.lignes) && d.lignes.length > 0) {
            const table = document.getElementById('table');
            while (table.rows.length > 1) table.deleteRow(1);
            d.lignes.forEach(function(l) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
<td><textarea class="desc-ta auto-ta" oninput="grow(this); calc()">${l.description || ''}</textarea></td>
<td class="date-cell"><span class="date-affichee"></span></td>
<td><input type="number" value="${l.qte || 1}" oninput="calc()"></td>
<td><input value="${l.unite || 'h'}"></td>
<td><input type="number" value="${l.prix || 0}" oninput="calc()"></td>
<td><input type="number" value="${l.tva || 20}" oninput="calc()"></td>
<td class="montant">0,00 €</td>`;
                table.appendChild(tr);
            });
        }
        appliquerDate();
        calc();
    }).catch(function(err) {
        afficherMessageEnregistrer('Erreur de chargement : ' + err.message, false);
    });
}

calc();
appliquerDate();

(function() {
chargerProfilEntreprise();

const params = new URLSearchParams(window.location.search);

const docId = params.get('docId');
if (docId) {
    (function attendreAuthPuisCharger() {
        if (authPret) { chargerDocumentDepuisFirestore(docId); }
        else { setTimeout(attendreAuthPuisCharger, 150); }
    })();
    return;
}

genererNumeroAutomatique('FACTURE');

const data = params.get('data');
if (!data) return;

let panier;
try { panier = JSON.parse(decodeURIComponent(data)); } catch(e) { return; }
if (!Array.isArray(panier) || panier.length === 0) return;

const table = document.getElementById('table');
while (table.rows.length > 1) table.deleteRow(1);

panier.forEach(function(art) {
const tr = document.createElement('tr');
tr.innerHTML = `
<td><textarea class="desc-ta auto-ta" oninput="grow(this); calc()">${art.des || ''}${art.ref ? ' (Réf: ' + art.ref + ')' : ''}</textarea></td>
<td class="date-cell"><span class="date-affichee"></span></td>
<td><input type="number" value="${art.qte || 1}" oninput="calc()"></td>
<td><input value="u"></td>
<td><input type="number" value="${art.px || 0}" oninput="calc()"></td>
<td><input type="number" value="20" oninput="calc()"></td>
<td class="montant">0,00 €</td>`;
table.appendChild(tr);
});

appliquerDate();
calc();
window.history.replaceState({}, document.title, window.location.pathname);
})();

function chargerProfilEntreprise() {
const nom = localStorage.getItem('artisan_nom');
const email = localStorage.getItem('artisan_contact');
const adresse = localStorage.getItem('artisan_adresse');
const siret = localStorage.getItem('artisan_siret');
const sirene = localStorage.getItem('artisan_sirene');
const tva = localStorage.getItem('artisan_tva');
const telephone = localStorage.getItem('artisan_telephone');
const logo = localStorage.getItem('artisan_logo');

const nomEl = document.getElementById('nomEntreprise');
const emailEl = document.getElementById('emailEntreprise');
const adresseEl = document.getElementById('adresseEntreprise');
const siretEl = document.getElementById('siretEntreprise');
const sireneEl = document.getElementById('sireneEntreprise');
const tvaEl = document.getElementById('tvaEntreprise');
const telEl = document.getElementById('telEntreprise');
const logoEl = document.getElementById('logo');
const logoPh = document.getElementById('logo-placeholder');

if (nom && nomEl) { nomEl.value = nom; grow(nomEl); }
if (email && emailEl) { emailEl.value = email; grow(emailEl); }
if (adresse && adresseEl) { adresseEl.value = adresse; grow(adresseEl); }
if (siret && siretEl) siretEl.value = siret;
if (sirene && sireneEl) sireneEl.value = sirene;
if (tva && tvaEl) tvaEl.value = tva;
if (telephone && telEl) telEl.value = telephone;

if (logo && logoEl) {
logoEl.src = logo;
logoEl.style.display = 'block';
if (logoPh) logoPh.style.display = 'none';
}
}
</script>
</body>
</html>
