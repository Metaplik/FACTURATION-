<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centralisateur Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 20px;
            color: #00bcd4;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 14px;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #2a2a2a;
            color: #fff;
            box-sizing: border-box;
        }
        input[type="file"] {
            margin-top: 10px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }
        .btn-success {
            background-color: #2e7d32;
            color: white;
        }
        .btn-success:hover {
            background-color: #1b5e20;
        }
        .btn-primary {
            background-color: #007bff;
            color: white;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .preview-box {
            margin-top: 15px;
            text-align: center;
            border: 2px dashed #444;
            padding: 10px;
            border-radius: 4px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preview-box img {
            max-width: 100%;
            max-height: 120px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Configuration Artisan</h1>

    <!-- Champ 1 : Nom de l'entreprise -->
    <label for="artisan-nom">Nom de l'entreprise :</label>
    <input type="text" id="artisan-nom" placeholder="Ex: Francilienne du dépannage">

    <!-- Champ 2 : Adresse Email -->
    <label for="artisan-email">Adresse Email :</label>
    <input type="email" id="artisan-email" placeholder="Ex: contact@entreprise.fr">

    <!-- Champ 3 : Adresse de l'entreprise -->
    <label for="artisan-adresse">Adresse de l'entreprise :</label>
    <input type="text" id="artisan-adresse" placeholder="Ex: 12 Rue de la Paix, Paris">

    <!-- Section Logo -->
    <label>Logo de l'entreprise :</label>
    <input type="file" id="logo-file" accept="image/*">
    
    <div class="preview-box" id="preview-container">
        <span id="preview-text" style="color: #888;">Aucun logo sélectionné</span>
        <img id="logo-preview" src="" alt="Aperçu du logo" style="display: none;">
    </div>

    <!-- Boutons d'action -->
    <button class="btn btn-success" id="btn-save">Enregistrer et mémoriser</button>
    
    <a href="./facture/index.html" class="btn btn-primary" style="margin-top: 10px;">Accéder à la Facturation</a>
</div>

<script>
    const nomInput = document.getElementById('artisan-nom');
    const emailInput = document.getElementById('artisan-email');
    const adresseInput = document.getElementById('artisan-adresse');
    const fileInput = document.getElementById('logo-file');
    const saveBtn = document.getElementById('btn-save');
    const logoPreview = document.getElementById('logo-preview');
    const previewText = document.getElementById('preview-text');

    let base64Logo = "";

    // Charger les données stockées au démarrage
    window.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('artisan_nom')) {
            nomInput.value = localStorage.getItem('artisan_nom');
        }
        if (localStorage.getItem('artisan_email')) {
            emailInput.value = localStorage.getItem('artisan_email');
        }
        if (localStorage.getItem('artisan_adresse')) {
            adresseInput.value = localStorage.getItem('artisan_adresse');
        }
        if (localStorage.getItem('artisan_logo')) {
            base64Logo = localStorage.getItem('artisan_logo');
            logoPreview.src = base64Logo;
            logoPreview.style.display = 'block';
            previewText.style.display = 'none';
        }
    });

    // Traitement du fichier image vers Base64
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                base64Logo = event.target.result;
                logoPreview.src = base64Logo;
                logoPreview.style.display = 'block';
                previewText.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    });

    // Sauvegarde dans le localStorage
    saveBtn.addEventListener('click', () => {
        localStorage.setItem('artisan_nom', nomInput.value);
        localStorage.setItem('artisan_email', emailInput.value);
        localStorage.setItem('artisan_adresse', adresseInput.value);
        if (base64Logo) {
            localStorage.setItem('artisan_logo', base64Logo);
        }
        alert('Informations enregistrées avec succès !');
    });
</script>

</body>
</html>
